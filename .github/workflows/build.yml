name: build

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build steinbock container
        run: docker compose build steinbock
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Run pytest in steinbock container
        run: docker compose run --rm pytest
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  pypi:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build .

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

  ghcr:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Print GitHub context
        run: echo "GITHUB_REF=$GITHUB_REF"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract steinbock version
        id: steinbock_meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create steinbock container metadata
        id: steinbock_container_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}

      - name: Build and publish steinbock container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: steinbock
          platforms: linux/amd64,linux/arm64
          build-args: |
            TENSORFLOW_TARGET=tensorflow
            STEINBOCK_TARGET=steinbock
            STEINBOCK_VERSION=${{ steps.steinbock_meta.outputs.version }}
          tags: ${{ steps.steinbock_container_meta.outputs.tags }}
          labels: ${{ steps.steinbock_container_meta.outputs.labels }}